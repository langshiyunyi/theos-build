name: Reusable Build

on:
  workflow_call:
    inputs:
      scheme:
        description: '构建方案：rootless / roothide / both'
        type: string
        default: both
      sdk-version:
        description: 'iOS SDK 版本（如 16.5；留空自动选择）'
        type: string
        default: ''
      make-target:
        description: 'make 目标（默认 package）'
        type: string
        default: package
      extra-make-flags:
        description: '额外 make 参数'
        type: string
        default: ''
      artifact-retention:
        description: 'artifact 保留天数'
        type: number
        default: 30
      theos-ref:
        description: 'Theos 仓库引用（分支/tag/commit）'
        type: string
        default: master
  workflow_dispatch:
    inputs:
      scheme:
        description: '构建方案'
        type: choice
        options:
          - rootless
          - roothide
          - both
        default: both
      sdk-version:
        description: 'iOS SDK 版本（留空自动）'
        type: string
        default: ''

env:
  THEOS: /opt/theos
  THEOS_LANGUAGE: english

jobs:
  prepare:
    name: 准备
    runs-on: ubuntu-latest
    outputs:
      schemes: ${{ steps.set.outputs.schemes }}
      pkg-name: ${{ steps.set.outputs.pkg-name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 读取包名
        id: set
        run: |
          input="${{ inputs.scheme || 'both' }}"
          if [ "$input" = "both" ]; then
            echo 'schemes=["rootless","roothide"]' >> "$GITHUB_OUTPUT"
          else
            echo "schemes=[\"$input\"]" >> "$GITHUB_OUTPUT"
          fi
          pkg=""
          if [ -f control ]; then
            pkg=$(grep -m1 '^Package:' control | awk '{print $2}')
          fi
          pkg=${pkg:-theos-package}
          echo "pkg-name=$pkg" >> "$GITHUB_OUTPUT"
          echo "检测到包名: $pkg"

  build:
    name: 构建 (${{ matrix.scheme }})
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        scheme: ${{ fromJson(needs.prepare.outputs.schemes) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential dpkg-dev fakeroot perl rsync curl ca-certificates \
            libplist-dev libssl-dev libc++-dev zlib1g-dev unzip

      - name: 缓存 Theos
        uses: actions/cache@v4
        with:
          path: /opt/theos
          key: theos-ubuntu-${{ inputs.theos-ref }}-v1

      - name: 安装 Theos
        env:
          THEOS_REF: ${{ inputs.theos-ref }}
        run: |
          if [ ! -d /opt/theos/.git ]; then
            git clone --recursive --depth 1 --branch "$THEOS_REF" \
              https://github.com/theos/theos.git /opt/theos || \
            git clone --recursive --depth 1 https://github.com/theos/theos.git /opt/theos
          fi

      - name: 安装 ldid
        run: |
          if ! command -v ldid >/dev/null 2>&1; then
            git clone --depth 1 https://github.com/theos/ldid.git /tmp/ldid
            make -C /tmp/ldid install PREFIX=/usr
            rm -rf /tmp/ldid
          fi
          ldid -V 2>/dev/null || true

      - name: 安装 iOS SDK
        env:
          SDK_INPUT: ${{ inputs.sdk-version }}
        run: |
          mkdir -p /opt/theos/sdks
          cd /opt/theos/sdks
          # 指定版本优先
          if [ -n "$SDK_INPUT" ]; then
            if [ ! -d "iPhoneOS${SDK_INPUT}.sdk" ]; then
              url="https://github.com/theos/sdks/raw/master/iPhoneOS${SDK_INPUT}.sdk.tar.xz"
              curl -fsSL "$url" -o sdk.tar.xz && tar -xf sdk.tar.xz && rm -f sdk.tar.xz
            fi
            ls -1d "iPhoneOS${SDK_INPUT}.sdk" && exit 0
          fi
          # 自动选择
          for sdk in iPhoneOS16.5 iPhoneOS15.2 iPhoneOS14.5 iPhoneOS13.0; do
            if [ -d "${sdk}.sdk" ]; then exit 0; fi
          done
          for sdk in iPhoneOS16.5 iPhoneOS15.2 iPhoneOS14.5 iPhoneOS13.0; do
            url="https://github.com/theos/sdks/raw/master/${sdk}.sdk.tar.xz"
            if curl -fsSL "$url" -o sdk.tar.xz; then
              tar -xf sdk.tar.xz && rm -f sdk.tar.xz
              echo "已安装 SDK: ${sdk}.sdk"
              exit 0
            fi
          done
          echo "::error::无法安装 iOS SDK"
          exit 1

      - name: 构建
        env:
          PKG_NAME: ${{ needs.prepare.outputs.pkg-name }}
          EXTRA_FLAGS: ${{ inputs.extra-make-flags }}
        run: |
          echo "::group::make clean"
          make clean THEOS=/opt/theos || true
          echo "::endgroup::"
          echo "::group::make ${{ inputs.make-target }}"
          make ${{ inputs.make-target }} \
            THEOS=/opt/theos \
            THEOS_PACKAGE_SCHEME=${{ matrix.scheme }} \
            $EXTRA_FLAGS
          echo "::endgroup::"

      - name: 收集产物
        env:
          PKG_NAME: ${{ needs.prepare.outputs.pkg-name }}
        run: |
          mkdir -p artifacts
          find packages -name "*.deb" -print -exec cp {} artifacts/ \;
          if [ -z "$(ls -A artifacts 2>/dev/null)" ]; then
            echo "::error::未找到 .deb 产物"
            exit 1
          fi
          echo "## 产物清单" >> $GITHUB_STEP_SUMMARY
          for f in artifacts/*.deb; do
            name=$(basename "$f")
            size=$(du -h "$f" | cut -f1)
            echo "- \`$name\` ($size)" >> $GITHUB_STEP_SUMMARY
          done
          ls -la artifacts/

      - name: 上传 artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.prepare.outputs.pkg-name }}-${{ matrix.scheme }}
          path: artifacts/*.deb
          if-no-files-found: error
          retention-days: ${{ inputs.artifact-retention }}
